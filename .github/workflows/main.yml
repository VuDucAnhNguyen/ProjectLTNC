name: MonkeyDave CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-game:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build and Compile with Docker
      run: |
        docker build -t monkeydave .
        docker run --rm monkeydave /bin/bash -c "cd MonkeyDave && make"
