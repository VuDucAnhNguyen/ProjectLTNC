name: MonkeyDave CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build and Compile with Docker
      run: |
        docker build -t monkeydave-all .
        
        docker run --name linux_builder monkeydave-all make
        docker cp linux_builder:/app/MonkeyDave/play_game .

        docker run --name win_builder monkeydave-all make -f Makefile.win
        docker cp win_builder:/app/MonkeyDave/MonkeyDave.exe .

    - name: Upload Build Product
      uses: actions/upload-artifact@v4
      with:
        name: raw-build-files

        path: |
          play_game
          MonkeyDave.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Files
        uses: actions/download-artifact@v4
        with:
          name: raw-build-files
          path: .

      - name: Package Windows Zip
        run: |
          mkdir -p MonkeyDave-Windows
          cp MonkeyDave.exe MonkeyDave-Windows/
          cp deps_win/bin/*.dll MonkeyDave-Windows/ 2>/dev/null || echo "No DLLs found"
          cp -r MonkeyDave/image_project MonkeyDave-Windows/
          cp -r MonkeyDave/audio_project MonkeyDave-Windows/
          cp -r MonkeyDave/font_project MonkeyDave-Windows/
          zip -r MonkeyDave-Windows.zip MonkeyDave-Windows/

      - name: Package Linux Zip
        run: |
          mkdir -p MonkeyDave-Linux
          cp play_game MonkeyDave-Linux/
          chmod +x MonkeyDave-Linux/play_game
          cp -r MonkeyDave/image_project MonkeyDave-Linux/
          cp -r MonkeyDave/audio_project MonkeyDave-Linux/
          cp -r MonkeyDave/font_project MonkeyDave-Linux/
          zip -r MonkeyDave-Linux.zip MonkeyDave-Linux/

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MonkeyDave-Windows.zip
            MonkeyDave-Linux.zip
          name: "MonkeyDave Release ${{ github.ref_name }}"
          body: "Bản phát hành chính thức phiên bản ${{ github.ref_name }}"
